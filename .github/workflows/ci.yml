name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile
      # next-env.d.ts is gitignored (auto-generated by `next dev`/`next build`).
      # Recreate the static-references version so tsc can resolve image / route
      # globals without running a full Next.js build in CI.
      - run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > apps/web/next-env.d.ts
      - run: pnpm check
      - run: pnpm typecheck
